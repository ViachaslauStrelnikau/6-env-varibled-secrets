name: Deployment
on:
  push:
    branches:
      - master
      - dev
env:
  MONGODB_DB_NAME: gha-demo

jobs:
  test:
    environment: testing
    env:
      MONGODB_CLUSTER_ADDRESS: cluster0.5iykpyb.mongodb.net
      MONGODB_USERNAME: ${{secrets.MONGODB_USERNAME}}
      MONGODB_PASSWORD: ${{secrets.MONGODB_PASSWORD}}
#      MONGODB_USERNAME: damneddementor_db_user
#      MONGODB_PASSWORD: VB7KG8V1ugGWPw9A
      PORT: 8080
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:${{env.PORT}}
      - name: Run tests
        run: npm test
      - name: Output information
        run: |
          echo "Mongo USERNAME:"${{env.MONGODB_USERNAME}}
          echo "Mongo DBNAME:"${{env.MONGODB_DB_NAME}}
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |
          echo "..."
